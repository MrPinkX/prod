async function signup() {


    button = document.getElementById("signup_button");

    if (button.innerHTML == "הרשם") {
        username = document.getElementById("username").value;
        password = document.getElementById("password").value;

        response = await fetch('/signup', {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({ usernamex: username, password: password, enter:true })
                        });



        results = await response.json();
        console.log(results);

    } else {
        username = document.getElementById("username").value;
        password = document.getElementById("password").value;

        response = await fetch('/login', {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({ usernamex: username, password: password, enter:true })
                        });



        results = await response.json();
        console.log(results);
    } 
    
    message = document.getElementById("message");
    message.innerHTML = results[0]

    if (results[0] == "success") {
        window.location.replace("/");
    }

    
    

}



async function getlocation() {

    location_input = document.getElementById("venue_location");
    let location;
    navigator.geolocation.getCurrentPosition(async function(position) {
        var lat = await position.coords.latitude;
        var lon = await position.coords.longitude;
        location = [lat, lon];
        console.log(location, "mkj");

        const geocoder = new google.maps.Geocoder();
    geocoder.geocode({location: {lat: location[0], lng: location[1]}}, (results, status) => {
    if (status === "OK") {
        location_input.value = results[0].formatted_address;
    } else {
        console.error("Geocoder failed due")}

    });
    })




    
    // location_input.innerHTML = location;
}
