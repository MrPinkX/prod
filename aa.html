<script>


const se = document.getElementById("sea");
const body = document.getElementById("body");
const add_venue_popup = document.getElementById("add_venue_popup")


body.onclick = function(e) {
    console.log(e.target.id)

    info_popup = document.getElementById("product_info_popup")

    if (e.target.id == "body") {
        info_popup.style.visibility = "hidden";
        add_venue_popup.style.visibility = "hidden";
    }
}




async function s() {
    
    response = await fetch('/search', {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ val: se.value })
                    });

    results = await response.json();

    console.log(results);

    
    result_cont = document.getElementById("result_container");
    result_cont.innerHTML = "";


    for (i=0; i<3; i++) {
        console.log(results[i])
        result_item = document.createElement("a");
        result_item.setAttribute("class", "result");

        result_item.id = i;

        result_item_name = document.createElement("p");
        result_item_name.setAttribute("class", "result_name");

        result_item.appendChild(result_item_name);

        result_item_producer =  document.createElement("p");
        result_item_producer.setAttribute("class", "result_producer");

        result_item.appendChild(result_item_producer);


        result_item_name.innerHTML = results[i]["product_name"];
        result_item_producer.innerHTML = results[i]["יצרן"];


        result_item.onclick = function(e) {
            info = results[e.target.id];

            venues = [{"backs": 14.90}, {"am:pm": 13.90}, {"supersal": 12.90}]


            info_popup = document.getElementById("product_info_popup");
            info_popup.style.visibility = "visible";


            popup_product = document.getElementById("popup_product_name");
            popup_producer = document.getElementById("popup_producer_name");
            popup_barcode  = document.getElementById("popup_barcode");

            popup_product.innerHTML = info["product_name"]
            popup_producer.innerHTML = info["מותג"]
            popup_barcode.innerHTML = info["barcode"]

            popup_venue_container = document.getElementById("popup_venues_container"); 
            popup_venue_container.innerHTML = "";

            for (i=0; i<venues.length; i++) {
                venue = document.createElement("div");
                venue.setAttribute("class", "popup_venue");

                venue_name = document.createElement("p")
                venue_name.setAttribute("class", "popup_venue_name");

                venue_name.innerHTML = Object.keys(venues[i])[0];


                price = document.createElement("p")
                price.setAttribute("class", "price");

                distance = 5;


                price.innerHTML = venues[i][Object.keys(venues[i])[0]]

                divider = document.createElement("div");
                divider.setAttribute("class", "venue_divider");

                


                venue.appendChild(venue_name);
                venue.appendChild(price);
                venue.appendChild(divider);

                popup_venue_container.appendChild(venue);
            }


        }


        result_cont.appendChild(result_item);
    }

}


async function add_venue() {
    popup = document.getElementById("add_venue_popup");

    popup.style.visibility = "visible";
}


async function add_venue_() {
    input_name = document.getElementById("venue_name");
    input_location = document.getElementById("venue_location");
    input_price = document.getElementById("price");

    popup.style.visibility = "visible";

    venue_dat = {"venue_name": input_name.value, "venue_location": input_location.value, "price": input_price.value}


    response = await fetch('/add_venue', {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify([venue_dat, popup_barcode.innerHTML])
                    });

    results = await response.json();

    console.log(results);
}



</script>
