<script>


const se = document.getElementById("sea");
const body = document.getElementById("body_");
const add_venue_popup = document.getElementById("add_venue_popup");
const side = document.getElementById("side");



body.onclick = function(e) {
    console.log(e.target.id)

    info_popup = document.getElementById("product_info_popup");
    recipe_popup = document.getElementById("recipe_popup"); 
    console.log("bb", e.target.id)

    if (e.target.id == "body_") {
        if (info_popup) {
            info_popup.style.visibility = "hidden";
            add_venue_popup.style.visibility = "hidden";
        }
        side.style.visibility = "hidden";

        if (recipe_popup)
        body.removeChild(recipe_popup);
    }
}

async function recipes() {
    document.getElementById('side').style.visibility='hidden'
    body.innerHTML = ''

    recipes_ = document.createElement("h2");
    recipes_.id = "recipes_title";

    recipes_.innerHTML = "מתכונים";

    add = document.createElement("h2");
    add.id = "add_recipes_"; 
    
    add.innerHTML = "+"; 

    body.appendChild(recipes_);
    body.appendChild(add);


    function recipe_popup_(recipe_object) {
        recipe_popup = document.createElement("div");
        recipe_popup.id = "recipe_popup"; 

        recipe_content = document.createElement("div");
        recipe_content.id = "recipe_content"; 

        recipe_popup_image = document.createElement("div");
        recipe_popup_image.innerHTML = `<img src="http://localhost:8080/burg.png" id="popup_image">`

        recipe_name = document.createElement("h2");
        recipe_name.id = "recipe_title"; 

        recipe_name.innerHTML = recipe_object["name"];

        recipe_description = document.createElement("p");
        recipe_description.id = "recipe_description"; 

        recipe_description.innerHTML = recipe_object["description"];
        

        recipe_price = document.createElement("p");
        recipe_price.id = "recipe_total_popup"; 

        recipe_price.innerHTML = recipe_object["price"] + "₪";


        recipe_ingrediants = document.createElement("div");
        recipe_ingrediants.id = "recipe_ingrediants_popup";

        console.log(JSON.parse(recipe_object["products"]))

        for (let i=0; i<JSON.parse(recipe_object['products']).length; i++) {
            console.log(recipe_object["products"][i], "asdAAASD")
            ingredient = document.createElement("p");
